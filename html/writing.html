<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stranica za pisanje scenarija</title>

    <!-- Google fontovi su dozvoljeni -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../css/writing.css">

</head>

<body>

<header class="zaglavlje-sticky bg-white border-b">
    <div class="container-header">

        <div class="zaglavlje-lijevo">
            <!-- ČIST SVG – dozvoljeno -->
            <button class="back-dugme">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 19L5 12L12 5"/>
                    <path d="M19 12H5"/>
                </svg>
            </button>

            <h1 class="naslov-projekta">
                THE LAST STARSHIP (Draft 2)
            </h1>
        </div>

        <div class="zaglavlje-dugmad">
            <button class="zaglavlje-dugme">SCENA</button>
            <button class="zaglavlje-dugme">AKCIJA</button>
            <button class="zaglavlje-dugme">LIK</button>
            <button class="zaglavlje-dugme">DIJALOG</button>
        </div>

        <div>
            <button class="spasi-dugme">SPASI</button>
        </div>

    </div>
</header>

<main class="glavni-izgled">

    <aside class="bocni-panel">
        <h2 class="scene-naslov">Scene <span>(3)</span></h2>

        <ul>
            <li class="lista-scena-item scene-active">
                <p class="naslov">1. INT. STARSHIP BRIDGE – NIGHT</p>
                <p class="broj">5/8</p>
            </li>

            <li class="lista-scena-item">
                <p class="naslov">2. EXT. ASTEROID FIELD – DAY</p>
                <p class="broj">3/8</p>
            </li>

            <li class="lista-scena-item">
                <p class="naslov">3. INT. ENGINE ROOM – NIGHT</p>
                <p class="broj">2/8</p>
            </li>
        </ul>
    </aside>

    <section class="editor-container">
        <div class="editor-paper">
            <div class="script-content">

                <div class="naslov-scene">EXT. LUNAR SURFACE – DAY</div>

                <div class="action-line">
                    "THE LAST STARSHIP" je naučno-fantastični projekat koji prati očajničku potragu...
                </div>

                <div class="character-name">KIRA</div>

            </div>
        </div>
    </section>

</main>

</body>
</html>
